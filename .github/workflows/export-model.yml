name: Export-Model

# Controls when the workflow will run
# Run only on the main branch
on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # All in one job, so I don't have to deal with uploading and downloading a venv
  build-and-export:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      # Install everything I need
      - name: Install Dependencies
        run: |
          echo Installing Dependencies
          python -m pip install --upgrade pip
          python -m pip install importlib-resources==5.13.0
          python -m pip install numpy==1.23.5
          python -m pip install memote
          python -m pip install cobra
          python -m pip install pytest
          python -m pip install matplotlib
          python -m pip install seaborn
          python -m pip install openpyxl
          python -m pip install git+https://github.com/segrelab/GEM2CUE.git@remove-classes

      # Export model file as json and excel file
      - name: Export Model
        run: python scripts/export_model.py

      # Auto-commit the changes directly without stashing
      - name: Auto-commit results
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_user_name: action-bot
          commit_message: "chore: export to other formats"
          file_pattern: model*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}