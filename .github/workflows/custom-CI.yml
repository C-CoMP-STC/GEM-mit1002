# This is a basic workflow to help you get started with Actions

name: Custom-CI

# Controls when the workflow will run
# Run for pushes and pulls on every branch and manually from the Actions tab
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # All in one job, so I don't have to deal with uploading and downloading a venv
  build-and-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      # Install everything I need
      - name: Install Dependencies
        run: |
          echo Installing Dependencies
          python -m pip install --upgrade pip
          python -m pip install importlib-resources==5.13.0
          python -m pip install numpy==1.23.5
          python -m pip install memote
          python -m pip install cobra
          python -m pip install pytest
          python -m pip install matplotlib
          python -m pip install seaborn
          python -m pip install openpyxl

      # Run the custom tests
      - name: Run Custom Tests with pytest
        run: pytest

      # Run the CUE simulations
      - name: Run CUE Simulations
        run: |
          python check_cue/01_run_cobra.py
          python check_cue/02_calc_cue.py
          python check_cue/03_plot_cue.py

      # Export model file as json and excel file
      - name: Export Model
        run: python export_model.py

      - name: Push to Remote
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          git add -A
          git commit -m "Run custom-CI workflow"
          git push
