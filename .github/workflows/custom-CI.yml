# This is a basic workflow to help you get started with Actions

name: Custom-CI

# Controls when the workflow will run
# Run only for pull requests
on:
  pull_request:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # All in one job, so I don't have to deal with uploading and downloading a venv
  build-and-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      # Install everything I need
      - name: Install Dependencies
        run: |
          echo Installing Dependencies
          python -m pip install --upgrade pip
          python -m pip install importlib-resources==5.13.0
          python -m pip install numpy==1.23.5
          python -m pip install memote
          python -m pip install cobra
          python -m pip install pytest
          python -m pip install matplotlib
          python -m pip install seaborn
          python -m pip install openpyxl
          python -m pip install git+https://github.com/segrelab/GEM2CUE.git@remove-classes

      # Run the custom tests
      - name: Run Custom Tests with pytest
        id: run-tests
        run: |
          TEST_RESULTS=$(pytest)
          echo $TEST_RESULTS
          PARSED_RESULTS="${TEST_RESULTS//$'\n'/'<br>'}"
          PARSED_RESULTS="${PARSED_RESULTS//$'\r'/'<br>'}"
          echo $PARSED_RESULTS
          echo "results=$PARSED_RESULTS" >> $GITHUB_OUTPUT
          printf "$TEST_RESULTS" > test/test_files/test_results/pytest_summary.md
        continue-on-error: true

      # Run the CUE simulations
      - name: Run CUE Simulations
        run: |
          python check_cue/01_run_cobra.py
          python check_cue/02_calc_cue.py
          python check_cue/03_plot_cue.py

      # Export model file as json and excel file
      - name: Export Model
        run: python export_model.py

      - name: Mention PR# in README.md
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: sed -i -e "s/[[:digit:]]\{3,4\}\*\* (CUSTOM-CI)/$PR_NUMBER\*\* (CUSTOM-CI)/" test/test_files/test_results/README.md

      # Auto-commit the changes directly without stashing
      - name: Auto-commit results
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_user_name: action-bot
          commit_message: "chore: add custom-CI test result"
          file_pattern: test/test_files/test_results/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}

      - name: Get commit SHA
        id: get-commit-sha
        run: echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Post comment
        uses: NejcZdovc/comment-pr@v2
        with:
          file: "ci_comment.md"
          identifier: "GITHUB_COMMENT_CUSTOM_CI"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GH_ACTION_RUN: ${{github.run_id}}
          COMMIT_SHA: ${{ env.COMMIT_SHA }}
