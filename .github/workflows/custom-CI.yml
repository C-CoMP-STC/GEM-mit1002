name: Custom-CI

# Controls when the workflow will run
# Run only for pull requests
on:
  pull_request:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  #################################################################
  # JOB 1: Run unit tests to verify model correctness.
  # This job can pass or fail, providing a clear test status.
  #################################################################
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      # Install everything I need
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Run the custom tests
      - name: Run Custom Tests with pytest
        run: pytest
  
  ##############################################################
  # JOB 2: Generate and commit analysis reports.
  # This job runs AFTER the test job, regardless of its outcome.
  ##############################################################
  report:
    runs-on: ubuntu-22.04
    # 'needs: test' makes this job wait for the 'test' job to finish.
    needs: test
    # 'if: always()' ensures this job runs even if the 'test' job failed.
    if: always()
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      # Install everything I need
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Generate the reports (custom and memote)
      - name: Generate Analysis Reports
        run: |
          python scripts/generate_growth_report.py
          python scripts/generate_pathway_report.py
          python scripts/generate_biomass_table.py
          python scripts/check_cue_values.py
          memote report snapshot --filename "scripts/results/memote-report.html" model.xml

      - name: Mention PR# in README.md
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: sed -i -e "s/[[:digit:]]\{3,4\}\*\* (CUSTOM-CI)/$PR_NUMBER\*\* (CUSTOM-CI)/" scripts/results/README.md

      # Auto-commit the changes directly without stashing
      - name: Auto-commit results
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_user_name: action-bot
          commit_message: "chore: add custom-CI test result"
          file_pattern: scripts/results/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}

      - name: Get commit SHA
        id: get-commit-sha
        run: echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Post comment
        uses: NejcZdovc/comment-pr@v2
        with:
          file: "ci_comment.md"
          identifier: "GITHUB_COMMENT_CUSTOM_CI"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GH_ACTION_RUN: ${{github.run_id}}
          COMMIT_SHA: ${{ env.COMMIT_SHA }}
